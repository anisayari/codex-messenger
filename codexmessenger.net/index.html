  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #dcebff;
      font-family: "Trebuchet MS", Verdana, Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: start;
    }

    .site {
      width: 100vw;
      background: #fff;
      box-shadow: 0 0 0 2px #0d2dbb, 0 9px 26px rgba(0, 31, 130, .22);
    }

    svg {
      width: 100%;
      height: 56.2799vw;
      display: block;
    }

    text {
      letter-spacing: 0;
      paint-order: stroke fill;
    }

    a {
      cursor: pointer;
    }

    a:focus-visible .focus-ring {
      stroke: #0019b8;
      stroke-width: 5;
      stroke-dasharray: 9 6;
      fill: none;
    }

    .gloss-pass {
      animation: gloss-slide 3.6s ease-in-out infinite;
    }

    .download-link:hover .download-button,
    .source-link:hover .source-panel,
    .social-link:hover .social-hit {
      filter: brightness(1.06);
    }

    .download-link:hover .download-label {
      transform: translateY(-1px);
    }

    .download-label {
      transition: transform .16s ease;
    }

    @keyframes gloss-slide {
      0%, 44% {
        transform: translateX(-520px);
        opacity: 0;
      }
      55% {
        opacity: .75;
      }
      72% {
        transform: translateX(520px);
        opacity: 0;
      }
      100% {
        transform: translateX(520px);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gloss-pass {
        animation: none;
      }
    }
  </style>
</head>
