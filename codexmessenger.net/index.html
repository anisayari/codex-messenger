  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #dceeff;
      font-family: "Trebuchet MS", Verdana, Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(1024px, 100vw);
      height: auto;
      display: block;
      background: #fff;
      box-shadow: 0 0 0 2px #1742b7;
    }

    .wide-page {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #fff;
      box-shadow: 0 0 0 2px #1742b7 inset;
    }

    text {
      letter-spacing: 0;
    }

    .focus-ring {
      fill: none;
      pointer-events: none;
    }

    a:focus-visible .focus-ring {
      stroke: #0019b8;
      stroke-width: 4;
      stroke-dasharray: 7 5;
    }

    .xp-taskbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      width: min(1024px, 100vw);
      height: 36px;
      display: grid;
      grid-template-columns: 112px 1fr 142px;
      transform: translateX(-50%);
      color: #fff;
      font-family: "Trebuchet MS", Verdana, Arial, sans-serif;
      background: linear-gradient(#39a0ff, #0059d8 55%, #003da8);
      border-top: 1px solid #4e86dc;
      box-shadow: 0 1px 0 #8fc1ff inset;
    }

    .start {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 14px;
      color: #fff;
      font-size: 21px;
      font-style: italic;
      font-weight: 900;
      text-decoration: none;
      background: linear-gradient(#66ea4f, #168e0b 55%, #056500);
      border-right: 2px solid #0b5e00;
      border-radius: 0 12px 13px 0;
      text-shadow: 1px 1px 0 #004200;
    }

    .windows-mark {
      width: 19px;
      height: 19px;
      display: inline-block;
      background:
        linear-gradient(90deg, #ff372b 0 50%, #00a3ff 50%) 0 0 / 100% 50% no-repeat,
        linear-gradient(90deg, #14b324 0 50%, #ffc400 50%) 0 100% / 100% 50% no-repeat;
      transform: skewY(-7deg);
      box-shadow: 1px 1px 0 rgba(0, 0, 0, .35);
    }

    .task {
      width: 214px;
      height: 28px;
      display: flex;
      align-items: center;
      align-self: center;
      gap: 7px;
      margin-left: 12px;
      padding: 0 9px;
      border: 1px solid #1c53bd;
      border-radius: 3px;
      background: linear-gradient(#3a9bff, #0753d7 48%, #0340a8);
      font-size: 14px;
      overflow: hidden;
      white-space: nowrap;
    }

    .task-buddies {
      width: 19px;
      height: 18px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: linear-gradient(90deg, #46bf28 0 45%, #54b8f5 46%);
      box-shadow: 0 -5px 0 rgba(255, 255, 255, .35) inset;
    }

    .tray-html {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding-right: 10px;
      background: linear-gradient(#1aa1ff, #0980dc);
      border-left: 1px solid #0e51bd;
      font-size: 14px;
    }

    .tray-light {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, .35);
      background: linear-gradient(#fff, #f03333);
    }

    .tray-light.blue {
      background: linear-gradient(#fff, #267aff);
    }

    .tray-light.green {
      background: linear-gradient(#fff56d, #008b3a);
    }

    @media (min-width: 1200px) and (min-aspect-ratio: 4 / 3) {
      body {
        align-items: flex-start;
      }

      .page,
      .xp-taskbar {
        display: none;
      }

      .wide-page {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
