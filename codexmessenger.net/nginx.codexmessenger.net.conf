server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.codexmessenger.net;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/codexmessenger.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codexmessenger.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://codexmessenger.net$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name codexmessenger.net;

    root /var/www/codexmessenger.net;
    index index.html;
    server_tokens off;
    autoindex off;

    ssl_certificate /etc/letsencrypt/live/codexmessenger.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codexmessenger.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), clipboard-read=(), clipboard-write=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), xr-spatial-tracking=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; manifest-src 'self'; upgrade-insecure-requests" always;

    location = / {
        expires -1;
        try_files /index.html =404;
    }

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        expires 1d;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        expires 1d;
        try_files $uri =404;
    }

    location = /favicon.ico {
        types {
            image/vnd.microsoft.icon ico;
        }
        expires 30d;
        try_files $uri =404;
    }

    location = /apple-touch-icon.png {
        types {
            image/png png;
        }
        expires 30d;
        try_files $uri =404;
    }

    location = /.well-known/security.txt {
        default_type text/plain;
        expires 1h;
        try_files $uri =404;
    }

    location /assets/ {
        types {
            application/javascript js;
            image/jpeg jpg jpeg;
            image/png png;
            image/svg+xml svg;
            image/webp webp;
        }
        default_type application/octet-stream;
        expires 7d;
        try_files $uri =404;
    }

    location = /downloads/CodexMessenger.exe {
        types {
            application/vnd.microsoft.portable-executable exe;
        }
        default_type application/octet-stream;
        expires 1d;
        try_files $uri =404;
    }

    location ~ "^/downloads/CodexMessenger-[0-9a-f]{8}\.exe$" {
        types {
            application/vnd.microsoft.portable-executable exe;
        }
        default_type application/octet-stream;
        expires 30d;
        try_files $uri =404;
    }

    location = /downloads/CodexMessenger.exe.sha256 {
        default_type text/plain;
        expires -1;
        try_files $uri =404;
    }

    location = /downloads/CodexMessenger-mac-arm64.dmg {
        types {
            application/octet-stream dmg;
        }
        default_type application/octet-stream;
        expires 1d;
        try_files $uri =404;
    }

    location ~ "^/downloads/CodexMessenger-mac-arm64-[0-9a-f]{8}\.dmg$" {
        types {
            application/octet-stream dmg;
        }
        default_type application/octet-stream;
        expires 30d;
        try_files $uri =404;
    }

    location = /downloads/CodexMessenger-mac-arm64.dmg.sha256 {
        default_type text/plain;
        expires -1;
        try_files $uri =404;
    }

    location /downloads/ {
        return 404;
    }

    location ~ /\.(?!well-known/security\.txt$) {
        deny all;
    }

    location ~* \.(?:md|conf|toml|ya?ml|json|lock|ps1|sh|env)$ {
        deny all;
    }

    location / {
        try_files $uri =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name codexmessenger.net www.codexmessenger.net;
    server_tokens off;

    return 301 https://codexmessenger.net$request_uri;
}
